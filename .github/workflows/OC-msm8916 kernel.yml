name: OC msm8916 kernel

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_config:
        description: "Select kernel config"
        required: false
        default: "msm8916_defconfig"
        type: choice
        options:
          - msm8916_defconfig
          - defconfig
      ccache_clear:
        description: "Set whether to clear the cache"
        required: false
        default: false
        type: boolean
      enable_overclock:
        description: "启用 CPU 超频（实验性，存在损坏设备风险）"
        required: false
        default: false
        type: boolean
      overclock_freq:
        description: "超频目标频率 MHz（仅 enable_overclock=true 时生效）"
        required: false
        default: "1400"
        type: choice
        options:
          - "1400"
          - "1600"
          - "1900"
      # ✅ 新增：nomodem 裁剪选项
      enable_nomodem:
        description: "裁剪 Modem/GPS（释放约 88MB 内存，启用后 SIM 卡/LTE 失效）"
        required: false
        default: false
        type: boolean

env:
  TZ: Asia/Shanghai
  KERNEL_REPO: Crychic-Band/kernel_ufi_msm8916
  KERNEL_BRANCH: msm8916/6.18

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: 初始化编译环境
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev dwarves fakeroot dpkg-dev debhelper rsync kmod cpio python3 git wget curl jq ccache libdw-dev
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Asia/Shanghai}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 创建虚拟磁盘扩展存储空间
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 克隆内核源码
        id: clone
        run: |
          cd /builder
          echo "仓库: https://github.com/${{ env.KERNEL_REPO }}"
          echo "分支: ${{ env.KERNEL_BRANCH }}"

          git clone \
            --depth=1 \
            --branch ${{ env.KERNEL_BRANCH }} \
            https://github.com/${{ env.KERNEL_REPO }}.git kernel

          cd kernel

          KERNEL_VERSION=$(grep -E "^VERSION = " Makefile | awk '{print $3}')
          KERNEL_PATCHLEVEL=$(grep -E "^PATCHLEVEL = " Makefile | awk '{print $3}')
          KERNEL_SUBLEVEL=$(grep -E "^SUBLEVEL = " Makefile | awk '{print $3}')
          FULL_VERSION="${KERNEL_VERSION}.${KERNEL_PATCHLEVEL}.${KERNEL_SUBLEVEL}"

          echo "kernel_version=${FULL_VERSION}" >> ${GITHUB_ENV}
          echo "kernel_version=${FULL_VERSION}" >> ${GITHUB_OUTPUT}
          echo "内核版本: ${FULL_VERSION}"

          if [ -f "arch/arm64/configs/msm8916_defconfig" ]; then
            echo "msm8916_defconfig 确认存在"
          else
            echo "错误: msm8916_defconfig 不存在"
            exit 1
          fi

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 恢复 ccache 编译缓存
        uses: actions/cache@v5
        with:
          path: /builder/kernel/.ccache
          key: msm8916-${{ env.kernel_version }}-${{ github.sha }}
          restore-keys: |
            msm8916-${{ env.kernel_version }}-

      - name: 加载基础 defconfig
        id: loadconfig
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        run: |
          cd /builder/kernel

          export CCACHE_DIR=/builder/kernel/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          ccache -M 5G
          [[ "${{ inputs.ccache_clear }}" == "true" ]] && ccache -C

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          REQUESTED_CONFIG="${{ inputs.kernel_config }}"

          if [ -f "arch/arm64/configs/${REQUESTED_CONFIG}" ]; then
            make ${REQUESTED_CONFIG}
          else
            echo "未找到 ${REQUESTED_CONFIG}，回退到 defconfig"
            make defconfig
          fi

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 注入 DAE + Docker + BBR 内核配置项
        id: injectconfig
        if: ${{ steps.loadconfig.outputs.status == 'success' && !cancelled() }}
        run: |
          cd /builder/kernel
          export ARCH=arm64
          CFG="./scripts/config"

          echo "=== [1/4] DAE 官方必须项 + SOCK_OPS ==="
          $CFG --enable  CONFIG_BPF
          $CFG --enable  CONFIG_BPF_SYSCALL
          $CFG --enable  CONFIG_BPF_JIT
          $CFG --enable  CONFIG_BPF_JIT_ALWAYS_ON
          $CFG --enable  CONFIG_CGROUPS
          $CFG --enable  CONFIG_KPROBES
          $CFG --enable  CONFIG_NET_INGRESS
          $CFG --enable  CONFIG_NET_EGRESS
          $CFG --module  CONFIG_NET_SCH_INGRESS
          $CFG --module  CONFIG_NET_CLS_BPF
          $CFG --enable  CONFIG_NET_CLS_ACT
          $CFG --enable  CONFIG_BPF_STREAM_PARSER
          $CFG --enable  CONFIG_DEBUG_INFO
          $CFG --disable CONFIG_DEBUG_INFO_REDUCED
          $CFG --enable  CONFIG_DEBUG_INFO_BTF
          $CFG --enable  CONFIG_KPROBE_EVENTS
          $CFG --enable  CONFIG_BPF_EVENTS
          $CFG --enable  CONFIG_CGROUP_BPF
          $CFG --enable  CONFIG_SOCK_CGROUP_DATA
          $CFG --enable  CONFIG_CGROUP_NET_CLASSID
          $CFG --enable  CONFIG_CGROUP_NET_PRIO
          $CFG --enable  CONFIG_DEBUG_INFO_BTF_MODULES
          $CFG --enable  CONFIG_IKCONFIG
          $CFG --enable  CONFIG_IKCONFIG_PROC
          $CFG --enable  CONFIG_XDP_SOCKETS
          $CFG --enable  CONFIG_XDP_SOCKETS_DIAG
          $CFG --enable  CONFIG_TRACEPOINTS
          $CFG --enable  CONFIG_UPROBE_EVENTS

          echo "=== [2/4] BBR + CAKE 网络加速 ==="
          $CFG --enable  CONFIG_TCP_CONG_ADVANCED
          $CFG --module  CONFIG_TCP_CONG_BBR
          $CFG --module  CONFIG_NET_SCH_CAKE
          $CFG --module  CONFIG_NET_SCH_FQ
          $CFG --module  CONFIG_NET_SCH_FQ_CODEL

          echo "=== [3/4] Docker 官方必须项 ==="
          $CFG --enable  CONFIG_NAMESPACES
          $CFG --enable  CONFIG_NET_NS
          $CFG --enable  CONFIG_PID_NS
          $CFG --enable  CONFIG_IPC_NS
          $CFG --enable  CONFIG_UTS_NS
          $CFG --enable  CONFIG_USER_NS
          $CFG --enable  CONFIG_CGROUP_CPUACCT
          $CFG --enable  CONFIG_CGROUP_DEVICE
          $CFG --enable  CONFIG_CGROUP_FREEZER
          $CFG --enable  CONFIG_CGROUP_SCHED
          $CFG --enable  CONFIG_CPUSETS
          $CFG --enable  CONFIG_MEMCG
          $CFG --enable  CONFIG_MEMCG_SWAP
          $CFG --enable  CONFIG_KEYS
          $CFG --enable  CONFIG_BLK_CGROUP
          $CFG --enable  CONFIG_BLK_DEV_THROTTLING
          $CFG --enable  CONFIG_CGROUP_PERF
          $CFG --enable  CONFIG_CGROUP_HUGETLB
          $CFG --enable  CONFIG_CFS_BANDWIDTH
          $CFG --enable  CONFIG_FAIR_GROUP_SCHED
          $CFG --module  CONFIG_VETH
          $CFG --module  CONFIG_BRIDGE
          $CFG --enable  CONFIG_BRIDGE_NETFILTER
          $CFG --enable  CONFIG_DUMMY
          $CFG --enable  CONFIG_NETFILTER
          $CFG --enable  CONFIG_NF_CONNTRACK
          $CFG --module  CONFIG_NF_NAT
          $CFG --module  CONFIG_IP_NF_IPTABLES
          $CFG --module  CONFIG_IP_NF_FILTER
          $CFG --module  CONFIG_IP_NF_MANGLE
          $CFG --module  CONFIG_IP_NF_TARGET_MASQUERADE
          $CFG --module  CONFIG_IP_NF_NAT
          $CFG --module  CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
          $CFG --module  CONFIG_NETFILTER_XT_MATCH_CONNTRACK
          $CFG --module  CONFIG_NETFILTER_XT_MATCH_IPVS
          $CFG --module  CONFIG_NETFILTER_XT_MARK
          $CFG --enable  CONFIG_IP_VS
          $CFG --enable  CONFIG_IP_VS_NFCT
          $CFG --enable  CONFIG_IP_VS_PROTO_TCP
          $CFG --enable  CONFIG_IP_VS_PROTO_UDP
          $CFG --enable  CONFIG_IP_VS_RR
          $CFG --module  CONFIG_OVERLAY_FS
          $CFG --enable  CONFIG_POSIX_MQUEUE
          $CFG --module  CONFIG_TUN
          $CFG --enable  CONFIG_SECCOMP
          $CFG --enable  CONFIG_SECCOMP_FILTER
          $CFG --enable  CONFIG_EXT4_FS
          $CFG --enable  CONFIG_EXT4_FS_POSIX_ACL
          $CFG --enable  CONFIG_EXT4_FS_SECURITY

          echo "=== [4/4] make olddefconfig ==="
          make olddefconfig

          echo "=== 配置验证 ==="
          for key in \
            CONFIG_BPF CONFIG_BPF_SYSCALL CONFIG_BPF_JIT \
            CONFIG_BPF_JIT_ALWAYS_ON CONFIG_CGROUPS CONFIG_KPROBES \
            CONFIG_NET_INGRESS CONFIG_NET_EGRESS \
            CONFIG_NET_SCH_INGRESS CONFIG_NET_CLS_BPF \
            CONFIG_NET_CLS_ACT CONFIG_BPF_STREAM_PARSER \
            CONFIG_DEBUG_INFO CONFIG_DEBUG_INFO_BTF \
            CONFIG_KPROBE_EVENTS CONFIG_BPF_EVENTS CONFIG_CGROUP_BPF \
            CONFIG_SOCK_CGROUP_DATA CONFIG_CGROUP_NET_CLASSID \
            CONFIG_TCP_CONG_BBR CONFIG_NET_SCH_CAKE \
            CONFIG_NET_SCH_FQ CONFIG_NET_SCH_FQ_CODEL \
            CONFIG_NAMESPACES CONFIG_MEMCG CONFIG_OVERLAY_FS \
            CONFIG_VETH CONFIG_NF_NAT CONFIG_SECCOMP \
            CONFIG_IKCONFIG CONFIG_IKCONFIG_PROC; do
            result=$(grep "^${key}=" .config 2>/dev/null || echo "NOT SET")
            echo "  ${key}: ${result##*=}"
          done

          grep "CONFIG_DEBUG_INFO_REDUCED" .config \
            && echo "WARNING: CONFIG_DEBUG_INFO_REDUCED 存在" \
            || echo "OK: CONFIG_DEBUG_INFO_REDUCED not set"

          grep "^CONFIG_BPF_LSM=" .config \
            && echo "WARNING: CONFIG_BPF_LSM 存在，可能变砖" \
            || echo "OK: CONFIG_BPF_LSM 未启用"

          grep "^CONFIG_DYNAMIC_FTRACE=" .config \
            && echo "WARNING: CONFIG_DYNAMIC_FTRACE 存在，可能变砖" \
            || echo "OK: CONFIG_DYNAMIC_FTRACE 未启用"

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 应用 CPU 超频补丁（实验性）
        id: overclock
        if: ${{ fromJSON(inputs.enable_overclock) == true && steps.injectconfig.outputs.status == 'success' && !cancelled() }}
        env:
          TARGET_MHZ: ${{ inputs.overclock_freq }}
          PATCH_SCRIPT: |
            import re, sys

            dts_path   = sys.argv[1]
            target_mhz = int(sys.argv[2])

            opp_map = {
                1400: (1400000000, 1200000),
                1600: (1600000000, 1225000),
                1900: (1900000000, 1250000),
            }

            levels = [(hz, uv) for mhz, (hz, uv) in sorted(opp_map.items()) if mhz <= target_mhz]

            with open(dts_path, "r") as f:
                content = f.read()

            if "1400000000" in content:
                print("already patched, skip")
                sys.exit(0)

            block = "\n\t\t/* overclock target: {}MHz */\n".format(target_mhz)
            for hz, uv in levels:
                block += "\t\topp-{} {{\n".format(hz)
                block += "\t\t\topp-hz = /bits/ 64 <{}>;\n".format(hz)
                block += "\t\t\topp-microvolt = <{}>;\n".format(uv)
                block += "\t\t\tturbo-mode;\n"
                block += "\t\t};\n"

            pat = re.compile(r"(opp-\d+\s*\{[^}]*opp-hz\s*=[^}]*\};)", re.DOTALL)
            ms  = list(pat.finditer(content))
            if not ms:
                print("ERROR: no opp blocks found")
                sys.exit(1)

            pos = ms[-1].end()
            with open(dts_path, "w") as f:
                f.write(content[:pos] + "\n" + block + content[pos:])

            print("patched: {}".format(dts_path))
            for hz, uv in levels:
                print("  {}MHz @ {}mV".format(hz // 1000000, uv // 1000))
        run: |
          cd /builder/kernel

          echo "超频目标: ${TARGET_MHZ} MHz"
          echo "警告: MSM8916 原厂最高 1200MHz，UFI001C 无散热，风险自负"

          DTS_FILE=""
          for f in \
            "arch/arm64/boot/dts/qcom/msm8916.dtsi" \
            "arch/arm64/boot/dts/qcom/msm8916-ufi.dtsi" \
            "arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dts"; do
            if [ -f "$f" ]; then
              DTS_FILE="$f"
              echo "找到 DTS 文件: ${DTS_FILE}"
              break
            fi
          done

          if [ -z "${DTS_FILE}" ]; then
            echo "未找到 DTS 文件，列出相关文件:"
            find arch/arm64/boot/dts/qcom/ \( -name "*.dtsi" -o -name "*.dts" \) \
              | grep -i "msm8916\|ufi" | head -20 || true
            exit 1
          fi

          echo "修改前 OPP 配置:"
          grep -n "opp-hz\|opp-microvolt\|opp-[0-9]" "${DTS_FILE}" | head -30 || true

          printf '%s' "${PATCH_SCRIPT}" > /tmp/patch_opp.py
          python3 /tmp/patch_opp.py "${DTS_FILE}" "${TARGET_MHZ}"

          echo "修改后 OPP 配置:"
          grep -n "opp-hz\|opp-microvolt\|turbo-mode" "${DTS_FILE}" || true

          echo "status=success" >> ${GITHUB_OUTPUT}

         
      - name: 注入 No-Modem 补丁（裁剪 Modem/GPS，释放约 88MB 内存）
        id: nomodem
        if: ${{ fromJSON(inputs.enable_nomodem) == true && steps.injectconfig.outputs.status == 'success' && !cancelled() }}
        env:
          NOMODEM_SCRIPT: |
            import re, sys, os, glob

            DTS_DIR    = "arch/arm64/boot/dts/qcom"
            DEVICE_DTS = os.path.join(DTS_DIR, "msm8916-thwc-ufi001c.dts")

            # ================================================================
            # reserved-memory 子节点：只能用 /delete-node/ 删除
            # 这些节点没有独立的 DTS 标签，不能用 &label 引用
            # ================================================================
            RESERVED_MEM_LABELS = {
                "mpss_mem":  ["mpss_mem",  "mpss@"],
                "mba_mem":   ["mba_mem",   "mba@"],
                "wcnss_mem": ["wcnss_mem", "wcnss@"],
                "rmtfs_mem": ["rmtfs_mem", "rmtfs@"],
                "rfsa_mem":  ["rfsa_mem",  "rfsa@"],
            }

            # ================================================================
            # 真正的设备节点（remoteproc / subsystem）：
            # 必须先清理 memory-region phandle，再 status = disabled
            # 判断依据：在 dtsi 中存在 "label: { ... }" 形式的标签定义
            # ================================================================
            DEVICE_NODE_CANDIDATES = [
                # (标签名, 是否有 memory-region 属性)
                ("mpss",   True),
                ("wcnss",  True),
            ]

            # ── 读取所有相关 dtsi/dts 文件 ──────────────────────────────────
            dtsi_files  = glob.glob(os.path.join(DTS_DIR, "msm8916*.dtsi"))
            dtsi_files += glob.glob(os.path.join(DTS_DIR, "msm8916*.dts"))

            all_content = {}
            for fpath in dtsi_files:
                with open(fpath, "r") as f:
                    all_content[fpath] = f.read()

            # ── 第一步：扫描 reserved-memory 节点名（带单元地址）────────────
            found_reserved = {}   # label -> "node-name@addr"
            for fpath, content in all_content.items():
                for label, keywords in RESERVED_MEM_LABELS.items():
                    if label in found_reserved:
                        continue
                    for kw in keywords:
                        pat = re.compile(
                            r'(?:' + re.escape(label) + r'\s*:\s*)?'
                            r'(' + re.escape(kw.rstrip('@')) + r'@[0-9a-fA-F]+)',
                            re.IGNORECASE
                        )
                        m = pat.search(content)
                        if m:
                            found_reserved[label] = m.group(1)
                            print(f"  [扫描] reserved-memory: {label} → "
                                  f"{m.group(1)} ({os.path.basename(fpath)})")
                            break

            # ── 第二步：扫描真实设备节点标签（必须是 label: node { 形式）───
            # 正则：label后跟冒号，再跟空白+标识符+空白+{
            # 例: mpss: remoteproc@4080000 {
            found_device_nodes = []   # [(label, has_memory_region)]
            for (candidate, has_mem) in DEVICE_NODE_CANDIDATES:
                label_def_pat = re.compile(
                    r'\b' + re.escape(candidate) + r'\s*:\s*\w[\w@]*\s*\{'
                )
                exists = any(
                    label_def_pat.search(content)
                    for content in all_content.values()
                )
                if exists:
                    found_device_nodes.append((candidate, has_mem))
                    print(f"  [扫描] 设备节点标签存在: &{candidate} "
                          f"(has memory-region: {has_mem})")
                else:
                    print(f"  [跳过] &{candidate} 无标签定义，不生成 override 块")

            # ── 第三步：构造追加到设备 DTS 末尾的 patch 片段 ────────────────
            patch_lines = [
                "",
                "/*",
                " * ============================================================",
                " * nomodem patch - injected by CI workflow at build time",
                " * 裁剪 Modem/GPS/WCNSS，释放约 88MB reserved-memory",
                " * 启用后 SIM 卡 / LTE / GPS 功能完全停用",
                " * ============================================================",
                " */",
                "",
            ]

            # 3-A：先清理设备节点的 phandle 引用并禁用
            #      必须在删除 reserved-memory 节点之前，防止 phandle 悬空
            if found_device_nodes:
                for (lbl, has_mem) in found_device_nodes:
                    patch_lines.append(f"/* disable remoteproc: {lbl} */")
                    patch_lines.append(f"&{lbl} {{")
                    if has_mem:
                        patch_lines.append("\t/delete-property/ memory-region;")
                        print(f"  [注入] &{lbl}: /delete-property/ memory-region")
                    patch_lines.append("\t/delete-property/ firmware-name;")
                    patch_lines.append("\tstatus = \"disabled\";")
                    patch_lines.append("};")
                    patch_lines.append("")
            else:
                # 兜底：至少处理 mpss
                print("  [兜底] 未扫描到设备节点，直接禁用 &mpss")
                patch_lines += [
                    "/* disable remoteproc: mpss (fallback) */",
                    "&mpss {",
                    "\t/delete-property/ memory-region;",
                    "\t/delete-property/ firmware-name;",
                    "\tstatus = \"disabled\";",
                    "};",
                    "",
                ]

            # 3-B：再删除 reserved-memory 中的节点
            patch_lines += [
                "/* remove modem reserved-memory regions */",
                "/ {",
                "\treserved-memory {",
            ]

            if found_reserved:
                for label, node_name in found_reserved.items():
                    patch_lines.append(f"\t\t/delete-node/ {node_name};")
                    print(f"  [注入] /delete-node/ {node_name};")
            else:
                print("  [警告] 未扫描到 reserved-memory 节点地址，使用兜底地址")
                for line in [
                    "/delete-node/ mpss@86800000;",
                    "/delete-node/ mba@8ea00000;",
                    "/delete-node/ wcnss@8b600000;",
                    "/delete-node/ rmtfs@86700000;",
                    "/delete-node/ rfsa@867e0000;",
                ]:
                    patch_lines.append(f"\t\t{line}")
                    print(f"  [兜底] {line}")

            patch_lines += ["\t};", "};", ""]

            # ── 第四步：追加到设备 DTS 末尾（含幂等检查）───────────────────
            with open(DEVICE_DTS, "r") as f:
                original = f.read()

            if "nomodem patch - injected by CI" in original:
                print("  [跳过] nomodem 补丁已存在，无需重复注入")
                sys.exit(0)

            with open(DEVICE_DTS, "a") as f:
                f.write("\n".join(patch_lines))

            print(f"\n✅ nomodem 补丁已追加到: {DEVICE_DTS}")

            # 打印末尾 60 行供日志核查
            with open(DEVICE_DTS, "r") as f:
                lines = f.readlines()
            print("\n=== 注入后 DTS 末尾 60 行 ===")
            for line in lines[-60:]:
                print(line, end="")
        run: |
          cd /builder/kernel

          echo "════════════════════════════════════════════════"
          echo "  注入 No-Modem 补丁"
          echo "  目标: arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dts"
          echo "  预期释放: ~88MB reserved-memory"
          echo "════════════════════════════════════════════════"

          DTS_FILE="arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dts"
          if [ ! -f "${DTS_FILE}" ]; then
            echo "❌ 设备 DTS 不存在: ${DTS_FILE}"
            find arch/arm64/boot/dts/qcom/ -name "*ufi*" | head -10 || true
            exit 1
          fi

          echo "注入前 modem 相关节点概览:"
          grep -rn "mpss\|mba_mem\|wcnss\|rmtfs\|rfsa" \
            arch/arm64/boot/dts/qcom/msm8916*.dtsi \
            arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dts \
            2>/dev/null | grep -v "^Binary" | head -40 || true

          echo ""
          echo "🐍 运行 nomodem 注入脚本..."
          printf '%s' "${NOMODEM_SCRIPT}" > /tmp/patch_nomodem.py
          python3 /tmp/patch_nomodem.py

          echo ""
          echo "注入后验证:"
          grep -n "delete-property\|delete-node\|status.*disabled" \
            "${DTS_FILE}" || true

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 编译内核（Image.gz + DTB）
        id: compile
        if: ${{ steps.injectconfig.outputs.status == 'success' && !cancelled() }}
        run: |
          cd /builder/kernel

          export CCACHE_DIR=/builder/kernel/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export DTC_FLAGS="-@"

          make -j$(nproc) Image.gz dtbs

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 打包 deb 安装包
        id: debpkg
        if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
        run: |
          cd /builder/kernel

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make -j$(nproc) bindeb-pkg \
            LOCALVERSION=-msm8916 \
            KDEB_PKGVERSION=${{ env.kernel_version }}-1 \
            KDEB_SOURCENAME=linux-msm8916

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 收集编译产物并打包
        id: package
        if: ${{ steps.debpkg.outputs.status == 'success' && !cancelled() }}
        run: |
          cd /builder
          mkdir -p kernel_package
          cd kernel_package

          KERNEL_VER="${{ env.kernel_version }}"

          # ✅ 后缀组合：超频 + nomodem 均可独立或叠加
          # 例: 6.18.0.tar.gz
          #     6.18.0-oc1600.tar.gz
          #     6.18.0-nomodem.tar.gz
          #     6.18.0-oc1600-nomodem.tar.gz
          if [ "${{ inputs.enable_overclock }}" == "true" ]; then
            OC_SUFFIX="-oc${{ inputs.overclock_freq }}"
          else
            OC_SUFFIX=""
          fi

          if [ "${{ inputs.enable_nomodem }}" == "true" ]; then
            NM_SUFFIX="-nomodem"
          else
            NM_SUFFIX=""
          fi

          PACKAGE_NAME="${KERNEL_VER}${OC_SUFFIX}${NM_SUFFIX}.tar.gz"
          echo "📦 产物包名: ${PACKAGE_NAME}"

          cp /builder/kernel/arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dtb ./
          cp /builder/kernel/arch/arm64/boot/Image.gz ./

          find /builder -maxdepth 1 \
            -name "linux-headers-*${KERNEL_VER}*.deb" ! -name "*dbg*" \
            -type f -exec cp {} ./linux-headers.deb \;

          find /builder -maxdepth 1 \
            -name "linux-image-*${KERNEL_VER}*.deb" ! -name "*dbg*" \
            -type f -exec cp {} ./linux-image.deb \;

          ls -la ./

          for f in msm8916-thwc-ufi001c.dtb Image.gz linux-headers.deb linux-image.deb; do
            [ -f "$f" ] || { echo "缺少文件: $f"; exit 1; }
          done

          tar -czf "${PACKAGE_NAME}" \
            msm8916-thwc-ufi001c.dtb \
            Image.gz \
            linux-headers.deb \
            linux-image.deb

          echo "package_path=/builder/kernel_package/${PACKAGE_NAME}" >> ${GITHUB_ENV}
          echo "package_name=${PACKAGE_NAME}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: 上传内核到 Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.package.outputs.status == 'success' && !cancelled() }}
        with:
          tag: kernel_stable
          artifacts: ${{ env.package_path }}
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## MSM8916 主线 LTS 内核

            - DAE / daed eBPF 透明代理完整支持
            - SOCK_OPS / BPF_STREAM_PARSER（daed 面板支持）
            - Docker 容器化完整支持
            - BTF + CO-RE eBPF 可移植性
            - BBR 拥塞控制算法
            - CAKE 队列调度器（解决 Docker 拉取卡顿）
            - ikconfig 支持 /proc/config.gz

            ## 刷机后验证
            ```
            sysctl net.ipv4.tcp_congestion_control
            sysctl net.core.default_qdisc
            cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_frequencies
            cat /sys/class/thermal/thermal_zone0/temp
            ```
